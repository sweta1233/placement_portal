<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Portal - Campus Recruitment System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root{--primary:#2563eb;--secondary:#64748b;--success:#16a34a;--danger:#dc2626;--warning:#d97706;--bg:#f1f5f9;}
body{background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;}
.sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,#1e3a5f 0%,#2563eb 100%);position:fixed;left:0;top:0;z-index:100;transition:.3s;}
.sidebar .nav-link{color:rgba(255,255,255,.8);padding:10px 20px;border-radius:8px;margin:2px 8px;transition:.2s;display:flex;align-items:center;gap:10px;}
.sidebar .nav-link:hover,.sidebar .nav-link.active{color:#fff;background:rgba(255,255,255,.2);}
.sidebar .logo{padding:20px;color:#fff;font-size:1.1rem;font-weight:700;border-bottom:1px solid rgba(255,255,255,.2);margin-bottom:10px;}
.main-content{margin-left:240px;padding:0;min-height:100vh;}
.topbar{background:#fff;padding:12px 24px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.page-body{padding:24px;}
.card{border:none;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.stat-card{border-radius:14px;padding:20px;color:#fff;position:relative;overflow:hidden;}
.stat-card .icon{font-size:2rem;opacity:.3;position:absolute;right:16px;top:16px;}
.stat-card h2{font-size:2rem;font-weight:700;margin:0;}
.stat-card p{margin:4px 0 0;opacity:.85;font-size:.9rem;}
.badge-status{padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:600;}
.badge-pending{background:#fef3c7;color:#92400e;}
.badge-approved{background:#d1fae5;color:#065f46;}
.badge-rejected{background:#fee2e2;color:#991b1b;}
.badge-closed{background:#e2e8f0;color:#475569;}
.badge-applied{background:#dbeafe;color:#1e40af;}
.badge-shortlisted{background:#fef9c3;color:#854d0e;}
.badge-selected{background:#dcfce7;color:#166534;}
.badge-waiting{background:#e0e7ff;color:#3730a3;}
.drive-card{border-left:4px solid var(--primary);transition:.2s;}
.drive-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
.login-page{min-height:100vh;background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 50%,#60a5fa 100%);display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border-radius:20px;padding:40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo h2{color:var(--primary);font-weight:700;}
.btn-primary{background:var(--primary);border-color:var(--primary);}
.btn-primary:hover{background:#1d4ed8;border-color:#1d4ed8;}
.table th{background:#f8fafc;font-weight:600;color:#475569;border-bottom:2px solid #e2e8f0;}
.search-bar{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:8px;width:300px;}
.search-bar input{border:none;outline:none;width:100%;font-size:.9rem;}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;}
.empty-state{text-align:center;padding:60px 20px;color:#94a3b8;}
.empty-state i{font-size:3rem;margin-bottom:16px;}
.notification{position:fixed;top:20px;right:20px;z-index:9999;min-width:280px;}
.profile-section{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;border-radius:16px;padding:28px;margin-bottom:20px;}
.progress-bar-custom{height:8px;border-radius:4px;}
@media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main-content{margin-left:0;}.topbar .sidebar-toggle{display:flex;}}
.fade-enter-active,.fade-leave-active{transition:opacity .2s;}
.fade-enter-from,.fade-leave-to{opacity:0;}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const { createApp, ref, reactive, computed, onMounted, watch, nextTick } = Vue;

// ==================== API ====================
const API = {
  token: localStorage.getItem('pp_token'),
  headers() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token}` };
  },
  async req(method, url, data, multipart) {
    const opts = { method, headers: multipart ? { 'Authorization': `Bearer ${this.token}` } : this.headers() };
    if (data && !multipart) opts.body = JSON.stringify(data);
    if (data && multipart) opts.body = data;
    const res = await fetch(url, opts);
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(json.error || 'Request failed');
    return json;
  },
  get: (url) => API.req('GET', url),
  post: (url, d) => API.req('POST', url, d),
  put: (url, d) => API.req('PUT', url, d),
  postForm: (url, d) => API.req('POST', url, d, true),
};

// ==================== MAIN APP ====================
const App = {
  template: `
  <div>
    <!-- Notifications -->
    <div class="notification">
      <transition-group name="fade">
        <div v-for="n in notifications" :key="n.id" :class="'alert alert-'+n.type+' alert-dismissible shadow'" role="alert" style="margin-bottom:8px;">
          <i :class="'bi bi-'+(n.type==='success'?'check-circle':'exclamation-triangle')+' me-2'"></i>
          {{n.msg}}
          <button type="button" class="btn-close" @click="removeNotif(n.id)"></button>
        </div>
      </transition-group>
    </div>

    <!-- Auth Pages -->
    <div v-if="!user">
      <LoginPage v-if="authPage==='login'" @login="handleLogin" @goto="authPage=$event" />
      <RegisterPage v-else @register="handleRegister" @goto="authPage=$event" />
    </div>

    <!-- Main App -->
    <div v-else class="d-flex">
      <!-- Sidebar -->
      <nav class="sidebar" :class="{open: sidebarOpen}">
        <div class="logo">
          <i class="bi bi-mortarboard-fill me-2"></i>PlacementPortal
        </div>
        <ul class="nav flex-column px-0">
          <template v-if="user.role==='admin'">
            <li><a class="nav-link" :class="{active:page==='dashboard'}" href="#" @click.prevent="page='dashboard'"><i class="bi bi-speedometer2"></i>Dashboard</a></li>
            <li><a class="nav-link" :class="{active:page==='companies'}" href="#" @click.prevent="page='companies'"><i class="bi bi-building"></i>Companies</a></li>
            <li><a class="nav-link" :class="{active:page==='students'}" href="#" @click.prevent="page='students'"><i class="bi bi-people"></i>Students</a></li>
            <li><a class="nav-link" :class="{active:page==='drives'}" href="#" @click.prevent="page='drives'"><i class="bi bi-briefcase"></i>Placement Drives</a></li>
            <li><a class="nav-link" :class="{active:page==='applications'}" href="#" @click.prevent="page='applications'"><i class="bi bi-file-earmark-text"></i>Applications</a></li>
            <li><a class="nav-link" :class="{active:page==='reports'}" href="#" @click.prevent="page='reports'"><i class="bi bi-bar-chart"></i>Reports & Stats</a></li>
          </template>
          <template v-if="user.role==='company'">
            <li><a class="nav-link" :class="{active:page==='dashboard'}" href="#" @click.prevent="page='dashboard'"><i class="bi bi-speedometer2"></i>Dashboard</a></li>
            <li><a class="nav-link" :class="{active:page==='drives'}" href="#" @click.prevent="page='drives'"><i class="bi bi-briefcase"></i>My Drives</a></li>
            <li><a class="nav-link" :class="{active:page==='applications'}" href="#" @click.prevent="page='applications'"><i class="bi bi-people"></i>Applications</a></li>
            <li><a class="nav-link" :class="{active:page==='profile'}" href="#" @click.prevent="page='profile'"><i class="bi bi-building-gear"></i>Company Profile</a></li>
          </template>
          <template v-if="user.role==='student'">
            <li><a class="nav-link" :class="{active:page==='dashboard'}" href="#" @click.prevent="page='dashboard'"><i class="bi bi-speedometer2"></i>Dashboard</a></li>
            <li><a class="nav-link" :class="{active:page==='drives'}" href="#" @click.prevent="page='drives'"><i class="bi bi-briefcase"></i>Placement Drives</a></li>
            <li><a class="nav-link" :class="{active:page==='applications'}" href="#" @click.prevent="page='applications'"><i class="bi bi-file-earmark-check"></i>My Applications</a></li>
            <li><a class="nav-link" :class="{active:page==='history'}" href="#" @click.prevent="page='history'"><i class="bi bi-clock-history"></i>History</a></li>
            <li><a class="nav-link" :class="{active:page==='companies'}" href="#" @click.prevent="page='companies'"><i class="bi bi-building"></i>Companies</a></li>
            <li><a class="nav-link" :class="{active:page==='profile'}" href="#" @click.prevent="page='profile'"><i class="bi bi-person-circle"></i>My Profile</a></li>
          </template>
        </ul>
        <div class="px-3 py-3 mt-auto" style="position:absolute;bottom:0;width:100%;">
          <div class="d-flex align-items-center gap-2 p-2 rounded" style="background:rgba(255,255,255,.1);">
            <div class="avatar" style="width:32px;height:32px;font-size:.8rem;">{{user.username[0].toUpperCase()}}</div>
            <div style="flex:1;min-width:0;">
              <div class="text-white fw-600" style="font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{user.username}}</div>
              <div style="font-size:.7rem;opacity:.7;color:#fff;">{{user.role}}</div>
            </div>
            <button class="btn btn-sm" style="color:rgba(255,255,255,.7);" @click="logout"><i class="bi bi-box-arrow-right"></i></button>
          </div>
        </div>
      </nav>

      <!-- Main -->
      <div class="main-content" style="flex:1;">
        <div class="topbar">
          <div class="d-flex align-items-center gap-3">
            <button class="btn btn-sm btn-outline-secondary d-md-none" @click="sidebarOpen=!sidebarOpen"><i class="bi bi-list"></i></button>
            <h5 class="mb-0 text-capitalize fw-600">{{pageTitle}}</h5>
          </div>
          <div class="d-flex align-items-center gap-3">
            <span class="badge rounded-pill" style="background:#dbeafe;color:#1e40af;">{{user.role.toUpperCase()}}</span>
            <div class="avatar">{{user.username[0].toUpperCase()}}</div>
          </div>
        </div>
        <div class="page-body">
          <!-- Admin Pages -->
          <AdminDashboard v-if="user.role==='admin' && page==='dashboard'" @notify="notify" />
          <AdminCompanies v-if="user.role==='admin' && page==='companies'" @notify="notify" />
          <AdminStudents v-if="user.role==='admin' && page==='students'" @notify="notify" />
          <AdminDrives v-if="user.role==='admin' && page==='drives'" @notify="notify" />
          <AdminApplications v-if="user.role==='admin' && page==='applications'" @notify="notify" />
          <AdminReports v-if="user.role==='admin' && page==='reports'" @notify="notify" />
          <!-- Company Pages -->
          <CompanyDashboard v-if="user.role==='company' && page==='dashboard'" :profile="profile" @notify="notify" />
          <CompanyDrives v-if="user.role==='company' && page==='drives'" @notify="notify" />
          <CompanyApplications v-if="user.role==='company' && page==='applications'" @notify="notify" />
          <CompanyProfile v-if="user.role==='company' && page==='profile'" :profile="profile" @notify="notify" @updated="fetchProfile" />
          <!-- Student Pages -->
          <StudentDashboard v-if="user.role==='student' && page==='dashboard'" :profile="profile" @notify="notify" @goto="page=$event" />
          <StudentDrives v-if="user.role==='student' && page==='drives'" @notify="notify" />
          <StudentApplications v-if="user.role==='student' && page==='applications'" @notify="notify" />
          <StudentHistory v-if="user.role==='student' && page==='history'" @notify="notify" />
          <StudentCompanies v-if="user.role==='student' && page==='companies'" @notify="notify" />
          <StudentProfile v-if="user.role==='student' && page==='profile'" :profile="profile" @notify="notify" @updated="fetchProfile" />
        </div>
      </div>
    </div>
  </div>`,

  setup() {
    const user = ref(null);
    const profile = ref(null);
    const page = ref('dashboard');
    const authPage = ref('login');
    const notifications = ref([]);
    const sidebarOpen = ref(false);

    const pageTitle = computed(() => {
      const map = { dashboard: 'Dashboard', companies: 'Companies', students: 'Students', drives: 'Placement Drives', applications: 'Applications', reports: 'Reports & Stats', profile: 'My Profile', history: 'Placement History' };
      return map[page.value] || page.value;
    });

    function notify(msg, type='success') {
      const id = Date.now();
      notifications.value.push({ id, msg, type });
      setTimeout(() => removeNotif(id), 4000);
    }
    function removeNotif(id) {
      notifications.value = notifications.value.filter(n => n.id !== id);
    }

    async function handleLogin({ token, user: u, profile: p }) {
      API.token = token;
      localStorage.setItem('pp_token', token);
      user.value = u;
      profile.value = p;
      page.value = 'dashboard';
    }

    async function handleRegister() {
      authPage.value = 'login';
      notify('Registration successful! Please login.');
    }

    async function fetchProfile() {
      try {
        const data = await API.get('/api/auth/me');
        user.value = data.user;
        profile.value = data.profile;
      } catch {}
    }

    function logout() {
      API.token = null;
      localStorage.removeItem('pp_token');
      user.value = null;
      profile.value = null;
      page.value = 'dashboard';
      authPage.value = 'login';
    }

    onMounted(async () => {
      if (API.token) {
        try {
          const data = await API.get('/api/auth/me');
          user.value = data.user;
          profile.value = data.profile;
        } catch { localStorage.removeItem('pp_token'); API.token = null; }
      }
    });

    return { user, profile, page, authPage, notifications, sidebarOpen, pageTitle, notify, removeNotif, handleLogin, handleRegister, fetchProfile, logout };
  }
};

// ==================== LOGIN PAGE ====================
const LoginPage = {
  emits: ['login', 'goto'],
  template: `
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div style="font-size:3rem;color:#2563eb;"><i class="bi bi-mortarboard-fill"></i></div>
        <h2>Placement Portal</h2>
        <p class="text-muted small">Campus Recruitment System</p>
      </div>
      <form @submit.prevent="doLogin">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input v-model="form.username" type="text" class="form-control" placeholder="Enter username" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input v-model="form.password" :type="showPw?'text':'password'" class="form-control" placeholder="Enter password" required>
            <button class="btn btn-outline-secondary" type="button" @click="showPw=!showPw"><i :class="'bi bi-eye'+(showPw?'-slash':'')"></i></button>
          </div>
        </div>
        <div v-if="error" class="alert alert-danger py-2 small">{{error}}</div>
        <button type="submit" class="btn btn-primary w-100" :disabled="loading">
          <span v-if="loading" class="spinner-border spinner-border-sm me-2"></span>
          Login
        </button>
      </form>
      <hr>
      <p class="text-center mb-0 small">Don't have an account? <a href="#" @click.prevent="$emit('goto','register')">Register here</a></p>
      <div class="mt-3 p-3 rounded" style="background:#f0f9ff;font-size:.8rem;">
        <strong>Demo Credentials:</strong><br>
        Admin: admin / admin123
      </div>
    </div>
  </div>`,
  setup(props, { emit }) {
    const form = reactive({ username: '', password: '' });
    const loading = ref(false);
    const error = ref('');
    const showPw = ref(false);
    async function doLogin() {
      loading.value = true; error.value = '';
      try {
        const data = await API.post('/api/auth/login', form);
        emit('login', data);
      } catch(e) { error.value = e.message; }
      loading.value = false;
    }
    return { form, loading, error, showPw, doLogin };
  }
};

// ==================== REGISTER PAGE ====================
const RegisterPage = {
  emits: ['register', 'goto'],
  template: `
  <div class="login-page" style="padding:20px 0;">
    <div class="login-card" style="width:500px;max-width:95vw;">
      <div class="login-logo">
        <div style="font-size:2.5rem;color:#2563eb;"><i class="bi bi-person-plus-fill"></i></div>
        <h2>Create Account</h2>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Register as</label>
        <div class="btn-group w-100">
          <button :class="'btn btn-'+(form.role==='student'?'primary':'outline-primary')" @click="form.role='student'"><i class="bi bi-mortarboard me-1"></i>Student</button>
          <button :class="'btn btn-'+(form.role==='company'?'primary':'outline-primary')" @click="form.role='company'"><i class="bi bi-building me-1"></i>Company</button>
        </div>
      </div>
      <form @submit.prevent="doRegister">
        <div class="row g-2">
          <div class="col-6">
            <label class="form-label fw-semibold small">Username *</label>
            <input v-model="form.username" type="text" class="form-control form-control-sm" required>
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold small">Email *</label>
            <input v-model="form.email" type="email" class="form-control form-control-sm" required>
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold small">Password *</label>
            <input v-model="form.password" type="password" class="form-control form-control-sm" required minlength="6">
          </div>
          <template v-if="form.role==='student'">
            <div class="col-6">
              <label class="form-label fw-semibold small">Full Name *</label>
              <input v-model="form.full_name" type="text" class="form-control form-control-sm" required>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold small">Roll Number</label>
              <input v-model="form.roll_number" type="text" class="form-control form-control-sm">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold small">Department</label>
              <input v-model="form.department" type="text" class="form-control form-control-sm" placeholder="e.g. Computer Science">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold small">Branch</label>
              <input v-model="form.branch" type="text" class="form-control form-control-sm" placeholder="e.g. CSE">
            </div>
            <div class="col-3">
              <label class="form-label fw-semibold small">Year</label>
              <select v-model="form.year" class="form-select form-select-sm">
                <option value="1">1st</option><option value="2">2nd</option><option value="3">3rd</option><option value="4">4th</option>
              </select>
            </div>
            <div class="col-3">
              <label class="form-label fw-semibold small">CGPA</label>
              <input v-model="form.cgpa" type="number" step="0.01" min="0" max="10" class="form-control form-control-sm">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold small">Phone</label>
              <input v-model="form.phone" type="tel" class="form-control form-control-sm">
            </div>
          </template>
          <template v-if="form.role==='company'">
            <div class="col-6">
              <label class="form-label fw-semibold small">Company Name *</label>
              <input v-model="form.company_name" type="text" class="form-control form-control-sm" required>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold small">HR Name</label>
              <input v-model="form.hr_name" type="text" class="form-control form-control-sm">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold small">Industry</label>
              <input v-model="form.industry" type="text" class="form-control form-control-sm">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold small">Website</label>
              <input v-model="form.website" type="url" class="form-control form-control-sm">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Description</label>
              <textarea v-model="form.description" class="form-control form-control-sm" rows="2"></textarea>
            </div>
          </template>
        </div>
        <div v-if="error" class="alert alert-danger py-2 small mt-2">{{error}}</div>
        <button type="submit" class="btn btn-primary w-100 mt-3" :disabled="loading">
          <span v-if="loading" class="spinner-border spinner-border-sm me-2"></span>
          Create Account
        </button>
      </form>
      <p class="text-center mt-3 mb-0 small">Already have an account? <a href="#" @click.prevent="$emit('goto','login')">Login</a></p>
    </div>
  </div>`,
  setup(props, { emit }) {
    const form = reactive({ role: 'student', username: '', email: '', password: '', full_name: '', roll_number: '', department: '', branch: '', year: 1, cgpa: 0, phone: '', company_name: '', hr_name: '', industry: '', website: '', description: '' });
    const loading = ref(false); const error = ref('');
    async function doRegister() {
      loading.value = true; error.value = '';
      try {
        await API.post('/api/auth/register', form);
        emit('register');
      } catch(e) { error.value = e.message; }
      loading.value = false;
    }
    return { form, loading, error, doRegister };
  }
};

// ==================== ADMIN DASHBOARD ====================
const AdminDashboard = {
  emits: ['notify'],
  template: `
  <div>
    <div v-if="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
    <div v-else>
      <div class="row g-3 mb-4">

        </table>
      </div>
    </div>
  </div>`,
  setup(props, { emit }) {
    const drives = ref([]); const apps = ref([]); const loading = ref(true); const selectedDriveId = ref('');
    async function loadApps() {
      if (selectedDriveId.value) {
        apps.value = await API.get(`/api/company/drives/${selectedDriveId.value}/applications`);
      } else {
        const all = [];
        for (const d of drives.value) {
          const a = await API.get(`/api/company/drives/${d.id}/applications`);
          all.push(...a);
        }
        apps.value = all;
      }

      try { await API.put(`/api/company/applications/${id}`, { status }); emit('notify','Updated'); loadApps(); }
      catch(e) { emit('notify',e.message,'danger'); }
    }
    onMounted(async () => {
      try { drives.value = await API.get('/api/company/drives'); await loadApps(); }
      catch(e) { emit('notify',e.message,'danger'); }
      loading.value = false;
    });
    return { drives, apps, loading, selectedDriveId, loadApps, update };
  }
};

    <div v-if="loading" class="text-center py-4"><div class="spinner-border text-primary"></div></div>
    <div v-else-if="history.length===0" class="empty-state"><i class="bi bi-journal-x"></i><p>No placement history</p></div>
    <div v-else class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>#</th><th>Company</th><th>Drive</th><th>Job Title</th><th>Interview</th><th>Status</th><th>Remarks</th></tr></thead>
        <tbody>
          <tr v-for="(a,i) in history" :key="a.id">
            <td>{{i+1}}</td>
            <td class="fw-semibold">{{a.company_name}}</td>
            <td>{{a.drive_name}}</td>
            <td>{{a.job_title}}</td>
            <td class="small">{{a.interview_type||'—'}}</td>
            <td><span :class="'badge-status badge-'+a.status">{{a.status}}</span></td>
            <td class="small text-muted">{{a.remarks||'—'}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>`,
  setup(props, { emit }) {
    const history = ref([]); const loading = ref(true);
    onMounted(async () => {
      try { history.value = await API.get('/api/student/history'); }
      catch(e) { emit('notify',e.message,'danger'); }
      loading.value = false;
    });
    return { history, loading };
  }
};

// ==================== STUDENT COMPANIES ====================
const StudentCompanies = {
  emits: ['notify'],
  template: `
  <div>
    <div class="search-bar mb-4" style="width:100%;max-width:400px;"><i class="bi bi-search text-muted"></i><input v-model="search" placeholder="Search companies..." @input="fetch"></div>
    <div v-if="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
    <div v-else-if="companies.length===0" class="empty-state card"><i class="bi bi-building"></i><p>No companies found</p></div>
    <div v-else class="row g-3">
      <div v-for="c in companies" :key="c.id" class="col-md-6 col-lg-4">
        <div class="card p-4 h-100 drive-card">
          <div class="d-flex gap-3 mb-3">
            <div class="avatar" style="width:48px;height:48px;font-size:1.2rem;flex-shrink:0;">{{c.company_name[0]}}</div>
            <div><h6 class="fw-bold mb-0">{{c.company_name}}</h6><div class="text-muted small">{{c.industry||'—'}}</div></div>
          </div>
          <p class="text-muted small">{{(c.description||'').slice(0,100)}}{{c.description && c.description.length>100?'...':''}}</p>
          <div class="small text-muted mt-auto">
            <div v-if="c.website"><i class="bi bi-globe me-1"></i><a :href="c.website" target="_blank">{{c.website}}</a></div>
            <div><i class="bi bi-envelope me-1"></i>{{c.hr_email||c.email||'—'}}</div>
          </div>
          <button class="btn btn-outline-primary btn-sm mt-3" @click="viewCompany(c)">View Details & Drives</button>
        </div>
      </div>
    </div>

    <!-- Company Detail Modal -->
    <div v-if="selectedCompany" class="modal d-block" style="background:rgba(0,0,0,.5);">
      <div class="modal-dialog modal-lg"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">{{selectedCompany.company_name}}</h5><button class="btn-close" @click="selectedCompany=null"></button></div>
        <div class="modal-body">
          <div class="row g-3 mb-4">
            <div class="col-md-8"><p>{{selectedCompany.description||'No description.'}}</p></div>
            <div class="col-md-4 small">
              <div class="mb-1"><strong>Industry:</strong> {{selectedCompany.industry||'—'}}</div>
              <div class="mb-1"><strong>HR:</strong> {{selectedCompany.hr_name||'—'}}</div>
              <div class="mb-1"><strong>Email:</strong> {{selectedCompany.hr_email||'—'}}</div>
              <div v-if="selectedCompany.website"><strong>Web:</strong> <a :href="selectedCompany.website" target="_blank">{{selectedCompany.website}}</a></div>
            </div>
          </div>
          <h6 class="fw-bold">Open Drives</h6>
          <div v-if="!selectedCompany.drives || selectedCompany.drives.length===0" class="text-muted small">No open drives currently.</div>
          <div v-else class="row g-2">
            <div v-for="d in selectedCompany.drives" :key="d.id" class="col-md-6">
              <div class="card p-3 drive-card"><div class="fw-semibold">{{d.drive_name}}</div><div class="text-muted small">{{d.job_title}} • {{d.location||'—'}}</div></div>
            </div>
          </div>
        </div>
      </div></div>
    </div>
  </div>`,
  setup(props, { emit }) {
    const companies = ref([]); const loading = ref(true); const search = ref(''); const selectedCompany = ref(null);
    async function fetch() {
      loading.value = true;
      try { companies.value = await API.get(`/api/student/companies?search=${search.value}`); }
      catch(e) { emit('notify',e.message,'danger'); }
      loading.value = false;
    }
    async function viewCompany(c) {
      try { selectedCompany.value = await API.get(`/api/student/companies/${c.id}`); }
      catch(e) { emit('notify',e.message,'danger'); }
    }
    onMounted(fetch);
    return { companies, loading, search, selectedCompany, fetch, viewCompany };
  }
};

// ==================== STUDENT PROFILE ====================
const StudentProfile = {
  props: ['profile'],
  emits: ['notify','updated'],
  template: `
  <div class="row g-4">
    <div class="col-md-8">
      <div class="card p-4">
        <h6 class="fw-bold mb-4">Edit Profile</h6>
        <div class="row g-3">
          <div class="col-6"><label class="form-label fw-semibold small">Full Name *</label><input v-model="form.full_name" class="form-control"></div>
          <div class="col-6"><label class="form-label fw-semibold small">Roll Number</label><input v-model="form.roll_number" class="form-control"></div>
          <div class="col-6"><label class="form-label fw-semibold small">Department</label><input v-model="form.department" class="form-control"></div>
          <div class="col-6"><label class="form-label fw-semibold small">Branch</label><input v-model="form.branch" class="form-control" placeholder="e.g. CSE"></div>
          <div class="col-3"><label class="form-label fw-semibold small">Year</label><select v-model="form.year" class="form-select"><option value="1">1st</option><option value="2">2nd</option><option value="3">3rd</option><option value="4">4th</option></select></div>
          <div class="col-3"><label class="form-label fw-semibold small">CGPA</label><input v-model="form.cgpa" type="number" step="0.01" min="0" max="10" class="form-control"></div>
          <div class="col-6"><label class="form-label fw-semibold small">Phone</label><input v-model="form.phone" class="form-control"></div>
          <div class="col-12"><label class="form-label fw-semibold small">Skills (comma-separated)</label><input v-model="form.skills" class="form-control" placeholder="Python, Java, React..."></div>
          <div class="col-12"><label class="form-label fw-semibold small">About</label><textarea v-model="form.about" class="form-control" rows="3" placeholder="Tell companies about yourself..."></textarea></div>
        </div>
        <button class="btn btn-primary mt-3" @click="save" :disabled="saving">
          <span v-if="saving" class="spinner-border spinner-border-sm me-1"></span>Save Changes
        </button>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-4">
        <h6 class="fw-bold mb-3">Resume Upload</h6>
        <div v-if="form.resume_filename" class="alert alert-success py-2 small">
          <i class="bi bi-file-earmark-pdf me-1"></i>{{form.resume_filename}}
        </div>
        <input type="file" ref="fileInput" accept=".pdf,.doc,.docx" class="form-control mb-3" @change="uploadResume">
        <p class="text-muted small">Upload PDF or DOC (max 16MB)</p>
      </div>
      <div class="card p-4 mt-3">
        <h6 class="fw-bold mb-3">Profile Completion</h6>
        <div v-for="f in completionFields" :key="f.key" class="d-flex align-items-center gap-2 mb-2">
          <i :class="'bi bi-'+(form[f.key]?'check-circle-fill text-success':'circle text-muted')"></i>
          <span class="small">{{f.label}}</span>
        </div>
        <div class="progress mt-3"><div class="progress-bar bg-success" :style="{width: completionPct+'%'}"></div></div>
        <div class="text-muted small mt-1 text-end">{{completionPct}}% complete</div>
      </div>
    </div>
  </div>`,
  setup(props, { emit }) {
    const form = reactive({});
    const saving = ref(false);
    const fileInput = ref(null);
    const completionFields = [
      { key:'full_name', label:'Full Name' },
      { key:'roll_number', label:'Roll Number' },
      { key:'department', label:'Department' },
      { key:'cgpa', label:'CGPA' },
      { key:'phone', label:'Phone' },
      { key:'skills', label:'Skills' },
      { key:'resume_filename', label:'Resume Uploaded' },
    ];
    const completionPct = computed(() => {
      const filled = completionFields.filter(f => form[f.key]).length;
      return Math.round(filled / completionFields.length * 100);
    });
    watch(() => props.profile, (p) => { if(p) Object.assign(form, p); }, { immediate: true });
    async function save() {
      saving.value = true;
      try { await API.put('/api/student/profile', form); emit('notify','Profile updated'); emit('updated'); }
      catch(e) { emit('notify',e.message,'danger'); }
      saving.value = false;
    }
    async function uploadResume() {
      const file = fileInput.value?.files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('resume', file);
      try { const r = await API.postForm('/api/student/profile/resume', fd); form.resume_filename = r.filename; emit('notify','Resume uploaded!'); }
      catch(e) { emit('notify',e.message,'danger'); }
    }
    return { form, saving, fileInput, completionFields, completionPct, save, uploadResume };
  }
};

// ==================== REGISTER & RUN ====================
const app = createApp(App);

// Register all components
const components = { LoginPage, RegisterPage, AdminDashboard, AdminCompanies, AdminStudents, AdminDrives, AdminApplications, AdminReports, CompanyDashboard, CompanyDrives, CompanyApplications, CompanyProfile, StudentDashboard, StudentDrives, StudentApplications, StudentHistory, StudentCompanies, StudentProfile };
Object.entries(components).forEach(([name, comp]) => app.component(name, comp));

app.mount('#app');
</script>
